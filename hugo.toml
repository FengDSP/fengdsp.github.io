baseURL = 'https://fengdsp.github.io/'
languageCode = 'en-us'
title = "Feng's Blog"
theme = 'PaperMod'
paginate = 5

[params]
  env = 'production'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  math = true

  [params.homeInfoParams]
    Title = "Feng"
    Content = "Building AI agent systems. Writing about architecture, tools, and lessons learned."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/FengDSP"

[taxonomies]
  tag = "tags"
  category = "categories"

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 2
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 3

[outputs]
  home = ["HTML", "RSS"]
